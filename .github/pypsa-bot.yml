tasks:
  sync-locks:
    triggers:
    - "pixi.toml"
    - "pixi.lock"
    stage:
    - "pixi.lock"
    - "envs/"

  generate-config:
    triggers:
    - "scripts/lib/validation/config/**"
    stage:
    - "config/"
    - "doc/"
    - "*.yaml"
    - "*.yml"

app:
  runs:
    - name: "config.validator.yaml"
      configfile: "config/test/config.validator.yaml"
      triggers: [main, pr]
      cache:
        key: "validator-{YYYY}-{MM}"
        dirs: ["data"]

